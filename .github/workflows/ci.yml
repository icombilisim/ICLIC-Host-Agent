name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    # GitHub-hosted: this repo is PUBLIC, and org self-hosted runners refuse
    # public repos by default (fork PRs could run code on them). Hosted runners
    # are free for public repos and carry no such risk. (#337)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go build (linux-amd64)
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags "-s -w" -o dist/iclic-host-agent-linux-amd64 ./cmd/agent

      - name: go build (linux-arm64)
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags "-s -w" -o dist/iclic-host-agent-linux-arm64 ./cmd/agent

      - name: go test
        run: go test ./...

      - uses: actions/upload-artifact@v4
        with:
          name: iclic-host-agent
          path: dist/
          retention-days: 7
