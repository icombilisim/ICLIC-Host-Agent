name: Release

# Tag-triggered release: pushing a `v*` tag (e.g. v0.3.0) builds linux
# binaries for amd64 + arm64, computes SHA256SUMS, and publishes a
# GitHub Release with everything install.sh expects (binaries, the
# installer script + systemd unit, and a configs tarball). Bump the
# AgentVersion const in internal/heartbeat/heartbeat.go in the same
# commit that gets tagged, so the running agent reports the right
# version on its first heartbeat after upgrade.

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Resolve version
        id: version
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Verify AgentVersion matches tag
        run: |
          # Tag is "vX.Y.Z"; const is "X.Y.Z". Reject if they disagree —
          # otherwise the release artefact reports a different version
          # than the dashboard sees in heartbeats.
          tag="${{ steps.version.outputs.tag }}"
          const="$(grep -oP 'AgentVersion\s*=\s*"\K[^"]+' internal/heartbeat/heartbeat.go)"
          if [ "v${const}" != "${tag}" ]; then
            echo "::error::AgentVersion (${const}) does not match tag (${tag}). Bump the const and retag."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.buildTag=${{ steps.version.outputs.tag }}" \
            -o dist/iclic-host-agent-linux-amd64 ./cmd/agent

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags "-s -w -X main.buildTag=${{ steps.version.outputs.tag }}" \
            -o dist/iclic-host-agent-linux-arm64 ./cmd/agent

      - name: Bundle configs
        run: |
          # Ship the entire configs/ tree as one tarball so install.sh
          # can drop it into /etc/iclic-host-agent/collectors.d in one
          # extract — no per-file curl loop, no partial deploys.
          tar -czf dist/configs.tar.gz -C configs .

      - name: Stage installer assets
        run: |
          cp installer/install.sh dist/install.sh
          cp installer/iclic-host-agent.service dist/iclic-host-agent.service

      - name: Compute SHA256SUMS
        run: |
          cd dist
          sha256sum \
            iclic-host-agent-linux-amd64 \
            iclic-host-agent-linux-arm64 \
            configs.tar.gz \
            install.sh \
            iclic-host-agent.service \
            > SHA256SUMS
          cat SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.version.outputs.tag }}"
          gh release create "${tag}" \
            --title "${tag}" \
            --generate-notes \
            dist/iclic-host-agent-linux-amd64 \
            dist/iclic-host-agent-linux-arm64 \
            dist/configs.tar.gz \
            dist/install.sh \
            dist/iclic-host-agent.service \
            dist/SHA256SUMS
