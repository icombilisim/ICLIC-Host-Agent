name: Release

# Automated releases via release-please. On every push to main it opens/updates
# a "release PR" (chore: release X.Y.Z) that bumps the version (manifest +
# AgentVersion via the x-release-please-version annotation) and the CHANGELOG.
# Merging that PR creates the tag + GitHub Release; the build job then attaches
# the linux binaries, configs tarball, installer + SHA256SUMS that install.sh
# expects. GitHub-hosted (this repo is public — free, and self-hosted refuses
# public repos). (#337)

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - name: Create release PR or GitHub release
        id: rp
        uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_PLEASE_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./...

      - name: Build linux/amd64
        env:
          GOOS: linux
          GOARCH: amd64
          CGO_ENABLED: 0
        run: |
          mkdir -p dist
          go build -trimpath -ldflags "-s -w -X main.buildTag=${{ needs.release-please.outputs.tag_name }}" \
            -o dist/iclic-host-agent-linux-amd64 ./cmd/agent

      - name: Build linux/arm64
        env:
          GOOS: linux
          GOARCH: arm64
          CGO_ENABLED: 0
        run: |
          go build -trimpath -ldflags "-s -w -X main.buildTag=${{ needs.release-please.outputs.tag_name }}" \
            -o dist/iclic-host-agent-linux-arm64 ./cmd/agent

      - name: Bundle configs
        run: tar -czf dist/configs.tar.gz -C configs .

      - name: Stage installer assets
        run: |
          cp installer/install.sh dist/install.sh
          cp installer/iclic-host-agent.service dist/iclic-host-agent.service

      - name: Compute SHA256SUMS
        run: |
          cd dist
          sha256sum \
            iclic-host-agent-linux-amd64 \
            iclic-host-agent-linux-arm64 \
            configs.tar.gz \
            install.sh \
            iclic-host-agent.service \
            > SHA256SUMS

      - name: Sign SHA256SUMS (Ed25519)
        # Signs SHA256SUMS so hosts can prove a release is authentic (it came
        # from us), not merely intact. The auto-updater refuses any release whose
        # signature does not verify, so an unsigned release is useless — fail the
        # build rather than publish one. (#35)
        env:
          AGENT_RELEASE_SIGNING_KEY: ${{ secrets.AGENT_RELEASE_SIGNING_KEY }}
        run: |
          if [ -z "${AGENT_RELEASE_SIGNING_KEY}" ]; then
            echo "ERROR: AGENT_RELEASE_SIGNING_KEY secret is not set." >&2
            echo "Run scripts/gen-release-signing-key.sh and add the private key" >&2
            echo "as the AGENT_RELEASE_SIGNING_KEY repo secret before releasing." >&2
            exit 1
          fi
          printf '%s\n' "${AGENT_RELEASE_SIGNING_KEY}" > "${RUNNER_TEMP}/signing.pem"
          # ubuntu-latest ships OpenSSL 3 → -rawin signs the raw message with the
          # pure-Ed25519 scheme that crypto/ed25519 verifies on the host side.
          openssl pkeyutl -sign \
            -inkey "${RUNNER_TEMP}/signing.pem" -rawin \
            -in dist/SHA256SUMS -out dist/SHA256SUMS.sig
          rm -f "${RUNNER_TEMP}/signing.pem"
          echo "Signed SHA256SUMS ($(wc -c < dist/SHA256SUMS.sig) bytes)"

      - name: Attach assets to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            dist/iclic-host-agent-linux-amd64 \
            dist/iclic-host-agent-linux-arm64 \
            dist/configs.tar.gz \
            dist/install.sh \
            dist/iclic-host-agent.service \
            dist/SHA256SUMS \
            dist/SHA256SUMS.sig \
            --clobber
