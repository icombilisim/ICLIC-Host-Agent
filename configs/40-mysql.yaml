# MySQL liveness and version. ICOSYS deployments run MySQL inside a
# container named `icosys-mysql` with port 3306 published to the host,
# so the TCP probe stays loopback-friendly but the version query and
# the systemctl unit-check are wrong on a containerized stack — we
# replace `systemctl is-active mysql.service` with a docker exec on
# the container, and the binary version with `mysql --version` inside
# the container. (#112)
#
# Drop / adjust on hosts where MySQL runs as a host service (then put
# back the systemctl + /usr/sbin/mysqld bindings).

- id: mysql_port_open
  primitive: tcp.connect
  args: { host: 127.0.0.1, port: 3306, timeout_sec: 2 }
  output_key: mysql_port_open

- id: mysql_version
  primitive: exec
  args:
    cmd: [docker, exec, icosys-mysql, mysql, --version]
    timeout_sec: 5
    parse: trimmed
  output_key: mysql_version

# Per-database on-disk size in MB for the report's "Databases" table. Uses the
# same containerized access as the version probe (root socket auth inside the
# container — no password in this file). System schemas are filtered ICLIC-side.
# Output is tab-separated "schema\tsize_mb" lines (-N no header, -B batch). On a
# host MySQL stack swap the docker exec for a plain `mysql`; add `-u/-p` if the
# container's root needs a password. Best-effort: omitted when the query can't run. (#796)
- id: mysql_db_sizes
  primitive: exec
  args:
    cmd:
      - sh
      - -c
      - 'docker exec icosys-mysql mysql -N -B -e "SELECT table_schema, ROUND(SUM(data_length+index_length)/1048576,1) FROM information_schema.tables GROUP BY table_schema ORDER BY 2 DESC"'
    timeout_sec: 10
    parse: raw
  output_key: mysql_db_sizes
