# Redis liveness and version. ICOSYS runs Redis inside a container
# named `icosys-redis` and the port is NOT published to the host —
# every probe goes via `docker exec` against the container. (#112)
#
# On a host-installed Redis (no docker), swap the docker exec calls
# for `/usr/bin/redis-server --version` and `/usr/bin/redis-cli`.

- id: redis_version
  primitive: exec
  args:
    cmd: [docker, exec, icosys-redis, redis-server, --version]
    timeout_sec: 5
    parse: trimmed
  output_key: redis_version

# Functional check — `PONG` only comes back if the daemon is accepting
# connections AND not in `LOADING`/`MASTERDOWN`/auth-fail state.
- id: redis_ping
  primitive: exec
  args:
    cmd: [docker, exec, icosys-redis, redis-cli, PING]
    timeout_sec: 5
    parse: trimmed
  output_key: redis_ping
