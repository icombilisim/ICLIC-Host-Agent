# nginx liveness and version. ICOSYS runs nginx inside a container
# named `icosys-nginx`. Ports 80/443 are published to the host so the
# TCP probes still hit the container correctly. The version probe goes
# via `docker exec` — and `nginx -v` writes to stderr, so we wrap in
# `sh -c` with `2>&1` to fold stderr into the captured stdout. (#112)
#
# On a host-installed nginx (no docker), swap the docker exec call
# for `/usr/sbin/nginx -v`.

- id: nginx_port_80_open
  primitive: tcp.connect
  args: { host: 127.0.0.1, port: 80, timeout_sec: 2 }
  output_key: nginx_port_80_open

- id: nginx_port_443_open
  primitive: tcp.connect
  args: { host: 127.0.0.1, port: 443, timeout_sec: 2 }
  output_key: nginx_port_443_open

- id: nginx_version
  primitive: exec
  args:
    cmd: [docker, exec, icosys-nginx, sh, -c, "nginx -v 2>&1"]
    timeout_sec: 5
    parse: trimmed
  output_key: nginx_version
