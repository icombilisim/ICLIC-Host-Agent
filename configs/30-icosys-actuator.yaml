# ICOSYS app metrics via Spring Boot Actuator. Each service runs inside
# a Docker container with stable name `icosys-<svc>` (icglb, icbpm,
# icdms, ichrm, icasm, icwfl) and the actuator ports are NOT published
# to the host — so we shell into the container with `docker exec` and
# wget loopback inside the container. The agent's iclic-agent user is
# added to the docker group at install time so /var/run/docker.sock
# is readable. (#112)
#
# Image requirement: each container must have `wget` available on PATH.
# eclipse-temurin's Ubuntu base ships wget by default. Failed bindings
# are silently omitted from the heartbeat.
#
# ICOSYS exposes only `health` and `info` on /actuator (default
# management.endpoints.web.exposure.include). v0.3.1/v0.3.2 had
# `/actuator/metrics/{process.uptime, jvm.memory.used, jvm.threads.live,
# http.server.requests}` bindings — they returned 404 on every probe
# because metrics aren't included in the exposure list. v0.3.3
# replaces them with two info bindings that are actually useful for
# fleet visibility:
#
#   * info.app.version       — declared semver from build-info.properties
#   * info.git.commit.id     — short commit hash from git-commit-id-plugin
#
# Adding `metrics` to ICOSYS Spring Boot exposure is an app-side
# change (icglb application.properties); when that lands a follow-up
# release can add the JVM metrics bindings back. (#112)
#
# Trim to the services that actually live on a given host (e.g. on a
# single-tenant deployment that only runs icglb, delete the others).

# ─── ICGLB (core, port 8010) ────────────────────────────────────────
- id: icglb_health
  primitive: exec
  args:
    cmd: [docker, exec, icosys-icglb, wget, -qO-, http://127.0.0.1:8010/icglb/services/actuator/health]
    parse: json
    path: status
    timeout_sec: 5
  output_key: icglb_health

- id: icglb_app_version
  primitive: exec
  args:
    cmd: [docker, exec, icosys-icglb, wget, -qO-, http://127.0.0.1:8010/icglb/services/actuator/info]
    parse: json
    path: app.version
    timeout_sec: 5
  output_key: icglb_app_version

- id: icglb_git_commit
  primitive: exec
  args:
    cmd: [docker, exec, icosys-icglb, wget, -qO-, http://127.0.0.1:8010/icglb/services/actuator/info]
    parse: json
    path: git.commit.id
    timeout_sec: 5
  output_key: icglb_git_commit

