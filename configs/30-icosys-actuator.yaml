# ICOSYS app metrics via Spring Boot Actuator. Each service runs inside a
# Docker container with stable name `icosys-<svc>` (icglb, icbpm, icdms,
# ichrm, icasm, icwfl) and the actuator ports are NOT published to the
# host — so we shell into the container with `docker exec` and curl
# loopback inside the container. The agent's iclic-agent user is added
# to the docker group at install time so /var/run/docker.sock is
# readable. (#112)
#
# Image requirement: each container must have `wget` available on PATH.
# eclipse-temurin's Ubuntu base ships wget by default — switching to
# wget instead of curl was a v0.3.2 fix after v0.3.1 produced 30
# `docker: exit status 127` warnings on every host. (#112)
# `wget -qO-` writes the body to stdout silently; non-2xx responses
# exit non-zero, which propagates as a binding failure.
#
# Each `metrics/<id>` shape is `{ measurements: [{statistic, value}, …] }` —
# we pull `measurements.0.value` which is the COUNT/VALUE statistic for
# the canonical Spring metrics. health is a single string.
#
# Trim to the services that actually live on a given host (e.g. on a
# single-tenant deployment that only runs icglb, delete the others).

# ─── ICGLB (core, port 8010) ────────────────────────────────────────
- id: icglb_health
  primitive: exec
  args:
    cmd: [docker, exec, icosys-icglb, wget, -qO-, http://127.0.0.1:8010/icglb/services/actuator/health]
    parse: json
    path: status
    timeout_sec: 5
  output_key: icglb_health

- id: icglb_uptime_sec
  primitive: exec
  args:
    cmd: [docker, exec, icosys-icglb, wget, -qO-, http://127.0.0.1:8010/icglb/services/actuator/metrics/process.uptime]
    parse: json
    path: measurements.0.value
    timeout_sec: 5
  output_key: icglb_uptime_sec

- id: icglb_heap_used
  primitive: exec
  args:
    cmd: [docker, exec, icosys-icglb, wget, -qO-, http://127.0.0.1:8010/icglb/services/actuator/metrics/jvm.memory.used]
    parse: json
    path: measurements.0.value
    timeout_sec: 5
  output_key: icglb_heap_used_bytes

- id: icglb_threads_live
  primitive: exec
  args:
    cmd: [docker, exec, icosys-icglb, wget, -qO-, http://127.0.0.1:8010/icglb/services/actuator/metrics/jvm.threads.live]
    parse: json
    path: measurements.0.value
    timeout_sec: 5
  output_key: icglb_threads_live

- id: icglb_http_requests
  primitive: exec
  args:
    cmd: [docker, exec, icosys-icglb, wget, -qO-, http://127.0.0.1:8010/icglb/services/actuator/metrics/http.server.requests]
    parse: json
    path: measurements.0.value
    timeout_sec: 5
  output_key: icglb_http_requests_total

